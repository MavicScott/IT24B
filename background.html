<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Current Weather</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            /* 🌸 Anime Night Sky Background */
            background-image: url("https://images8.alphacoders.com/104/thumb-1920-1043142.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            backdrop-filter: brightness(0.55);
            position: relative;
            overflow: hidden;
        }
        /* 🌙 Glowing Moon */
        
        .moon {
            position: absolute;
            top: 40px;
            right: 60px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, #fff 40%, #e3e3ff 70%, rgba(255, 255, 255, 0) 100%);
            border-radius: 50%;
            box-shadow: 0 0 25px #ffffff, 0 0 45px #d8d8ff, 0 0 70px #ffffff;
            animation: glow 4s ease-in-out infinite alternate;
        }
        /* 🌙 Moon Glow Animation */
        
        @keyframes glow {
            0% {
                box-shadow: 0 0 20px #ffffff, 0 0 40px #d8d8ff, 0 0 60px #ffffff;
                transform: scale(1);
            }
            100% {
                box-shadow: 0 0 35px #ffffff, 0 0 70px #e6e6ff, 0 0 100px #ffffff;
                transform: scale(1.08);
            }
        }
        
        #weatherResult {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.45);
            display: inline-block;
            border-radius: 10px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            background: #c084fc;
            color: white;
            transition: 0.3s;
        }
        
        button:hover {
            background: #e9a8ff;
        }
    </style>
</head>

<body>
    <div class="moon"></div>

    <h1>Current Weather</h1>
    <button onclick="getWeather()">Get Weather</button>

    <div id="weatherResult"></div>

    <script>
        const apiKey = "b32786b808e33a9e3d7051cd1a10ad6f";

        async function getWeather() {

            console.log("Prompt opened. " + Date());
            const city = prompt("Enter a city name");
            console.log("Prompt closed. " + Date());

            if (!city) {
                alert("No city entered.");
                console.log("No city entered. " + Date());
                return;
            }

            const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("City not found");

                const data = await response.json();

                const weatherResult = document.getElementById("weatherResult");
                weatherResult.innerHTML = `
                    <h2>${data.name}, ${data.sys.country}</h2>
                    <p>Temperature: ${data.main.temp} °C</p>
                    <p>Weather: ${data.weather[0].description}</p>
                    <p>Humidity: ${data.main.humidity} %</p>
                    <p>Wind Speed: ${data.wind.speed} m/s</p>
                `;

            } catch (error) {
                console.log("Error: " + error.message);
            }
        }
    </script>

</body>

</html>
